<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>星辉售前助手</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --r: 12px;
      --r-sm: 8px;
      --nav: 60px;
      --hdr: 56px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; }
    body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }

    /* Header */
    .hdr { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--hdr); background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:space-between; padding:0 16px; box-shadow:0 2px 8px rgba(99,102,241,.3); }
    .hdr-brand { display:flex; align-items:center; gap:8px; }
    .hdr-icon { font-size:20px; }
    .hdr-title { color:#fff; font-size:16px; font-weight:700; }
    .hdr-sub { color:rgba(255,255,255,.75); font-size:11px; }
    .hdr-stats { display:flex; gap:14px; }
    .h-stat { text-align:center; }
    .h-stat-v { color:#fff; font-size:15px; font-weight:700; line-height:1; }
    .h-stat-l { color:rgba(255,255,255,.7); font-size:10px; }

    /* Main */
    .main { position:fixed; top:var(--hdr); bottom:var(--nav); left:0; right:0; overflow:hidden; }
    .page { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; flex-direction:column; }
    .page.active { display:flex; }

    /* Nav */
    .bnav { position:fixed; bottom:0; left:0; right:0; z-index:100; height:var(--nav); background:#fff; border-top:1px solid var(--border); display:flex; padding-bottom:env(safe-area-inset-bottom); }
    .nbtn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:none; cursor:pointer; color:var(--muted); font-size:10px; transition:color .2s; font-family:inherit; }
    .nbtn .ni { font-size:22px; transition:transform .2s; }
    .nbtn.active { color:var(--primary); }
    .nbtn.active .ni { transform:scale(1.15); }

    /* Chat Page */
    .chat-msgs { flex:1; padding:12px 12px 0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .welcome { background:var(--card); border-radius:var(--r); padding:20px 16px; text-align:center; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .wl-icon { font-size:40px; margin-bottom:8px; }
    .welcome h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
    .welcome p { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .qas { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .qbtn { background:var(--primary-light); color:var(--primary-dark); border:none; border-radius:20px; padding:6px 14px; font-size:12px; cursor:pointer; font-family:inherit; }
    .qbtn:active { background:var(--primary); color:#fff; transform:scale(.96); }

    .msg { margin-bottom:10px; display:flex; }
    .msg.user { justify-content:flex-end; }
    .msg.bot { justify-content:flex-start; }
    .bubble { max-width:82%; padding:10px 14px; border-radius:16px; font-size:13.5px; line-height:1.6; word-break:break-word; white-space:pre-wrap; }
    .msg.user .bubble { background:linear-gradient(135deg,var(--primary),#8b5cf6); color:#fff; border-bottom-right-radius:4px; }
    .msg.bot .bubble { background:var(--card); color:var(--text); border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .typing { display:none; align-items:center; gap:4px; padding:10px 14px; margin-bottom:10px; }
    .td { width:7px; height:7px; border-radius:50%; background:var(--primary); animation:bounce 1.2s infinite; }
    .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    .chat-inp-area { background:#fff; border-top:1px solid var(--border); padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom)); }
    .inp-row { display:flex; align-items:flex-end; gap:8px; }
    .ctextarea { flex:1; border:1.5px solid var(--border); border-radius:20px; padding:10px 16px; font-size:14px; font-family:inherit; resize:none; outline:none; line-height:1.4; max-height:120px; background:var(--bg); transition:border-color .2s; }
    .ctextarea:focus { border-color:var(--primary); background:#fff; }
    .sbtn { width:42px; height:42px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--primary),#8b5cf6); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sbtn:active { transform:scale(.9); }

    /* Search Page */
    .sp-inner { padding:12px; display:flex; flex-direction:column; gap:10px; }
    .sbox { background:var(--card); border-radius:var(--r); padding:10px 14px; display:flex; align-items:center; gap:8px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .sinp { flex:1; border:none; outline:none; font-size:14px; font-family:inherit; background:transparent; color:var(--text); }
    .sinp::placeholder { color:var(--muted); }
    .frow { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
    .frow::-webkit-scrollbar{display:none}
    .fsel { flex-shrink:0; border:1.5px solid var(--border); border-radius:20px; padding:6px 12px; font-size:12px; background:var(--card); color:var(--text); outline:none; cursor:pointer; font-family:inherit; }
    .rcnt { color:var(--muted); font-size:12px; padding:0 4px; }
    .rlist { display:flex; flex-direction:column; gap:8px; padding-bottom:12px; }

    /* Result Card */
    .rc { background:var(--card); border-radius:var(--r); padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; border:2px solid transparent; transition:transform .15s,box-shadow .15s; }
    .rc:active { transform:scale(.98); box-shadow:0 4px 12px rgba(99,102,241,.2); border-color:var(--primary-light); }
    .rch { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .rc-co { font-weight:700; font-size:14px; flex:1; }
    .rc-ty { font-size:11px; padding:2px 8px; border-radius:10px; white-space:nowrap; flex-shrink:0; background:var(--primary-light); color:var(--primary-dark); }
    .rc-pos { color:var(--muted); font-size:13px; margin-bottom:8px; }
    .rc-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
    .rc-tag { font-size:11px; color:var(--muted); background:var(--bg); padding:2px 8px; border-radius:10px; }
    .rc-price { font-size:13px; font-weight:600; color:var(--primary-dark); }

    /* Detail Drawer */
    .doverlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.4); display:none; align-items:flex-end; }
    .doverlay.open { display:flex; }
    .ddrawer { background:var(--card); width:100%; max-height:88vh; border-radius:20px 20px 0 0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 0 calc(20px + env(safe-area-inset-bottom)); animation:slideUp .3s ease; }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .dhandle { width:40px; height:4px; border-radius:2px; background:#d1d5db; margin:12px auto 0; }
    .dclose { position:absolute; top:12px; right:16px; width:32px; height:32px; border-radius:50%; border:none; background:var(--bg); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
    .dhdr { padding:16px 16px 12px; position:relative; }
    .d-co { font-size:18px; font-weight:700; margin-bottom:8px; }
    .dtags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .dtag { font-size:12px; padding:3px 10px; border-radius:12px; background:var(--primary-light); color:var(--primary-dark); font-weight:500; }
    .dtag2 { background:#fce7f3; color:#9d174d; }
    .d-pos { font-size:15px; color:var(--muted); }
    .dbody { padding:0 16px; }
    .igrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .iitem { background:var(--bg); border-radius:var(--r-sm); padding:10px; }
    .ilbl { font-size:11px; color:var(--muted); margin-bottom:3px; }
    .ival { font-size:13px; font-weight:600; }
    .pbox { background:linear-gradient(135deg,#ede9fe,#fce7f3); border-radius:var(--r); padding:14px; margin-bottom:14px; display:flex; justify-content:space-around; }
    .pitem { text-align:center; }
    .plbl { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .pval { font-size:18px; font-weight:700; color:var(--primary-dark); }
    .stitle { font-size:14px; font-weight:700; margin-bottom:8px; }
    .jdtxt { font-size:13px; line-height:1.7; background:var(--bg); border-radius:var(--r-sm); padding:12px; margin-bottom:14px; }
    .notebox { background:#fffbeb; border-left:3px solid #f59e0b; border-radius:0 var(--r-sm) var(--r-sm) 0; padding:10px 12px; margin-bottom:14px; font-size:13px; color:#92400e; }
    .rply-box { background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:var(--r); padding:12px; font-size:13px; line-height:1.7; color:#065f46; white-space:pre-wrap; word-break:break-word; margin-bottom:10px; }
    .rply-acts { display:flex; gap:8px; }
    .rbtn { flex:1; padding:10px; border-radius:var(--r-sm); border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .rbtn.copy { background:var(--primary); color:#fff; }
    .rbtn.regen { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
    .rbtn:active { transform:scale(.96); }

    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-ico { font-size:48px; margin-bottom:12px; }
    .empty h3 { font-size:15px; font-weight:600; margin-bottom:6px; color:var(--text); }
    .empty p { font-size:13px; }

    .toast { position:fixed; bottom:calc(var(--nav) + 16px); left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.8); color:#fff; border-radius:20px; padding:8px 20px; font-size:13px; z-index:999; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">✨</div>
    <div>
      <div class="hdr-title">星辉售前助手</div>
      <div class="hdr-sub">智能匹配系统</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="h-stat"><div class="h-stat-v" id="stat-total">-</div><div class="h-stat-l">产品</div></div>
    <div class="h-stat"><div class="h-stat-v" id="stat-types">-</div><div class="h-stat-l">类型</div></div>
    <div class="h-stat"><div class="h-stat-v" id="stat-industries">-</div><div class="h-stat-l">行业</div></div>
  </div>
  <button id="ai-toggle" onclick="toggleAIMode()" style="position:absolute;right:12px;top:42px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:12px;color:#fff;font-size:11px;padding:3px 10px;cursor:pointer;font-family:inherit;font-weight:600;" title="切换AI智能分析模式">🤖 AI</button>
</header>

<div class="main">

  <!-- AI Chat Page -->
  <div class="page active" id="page-chat">
    <div class="chat-msgs" id="chat-msgs">
      <div class="welcome">
        <div class="wl-icon">🤖</div>
        <h3>欢迎使用星辉售前助手</h3>
        <p>将客户的微信消息粘贴到下方，我会自动分析需求并推荐最合适的产品</p>
        <div class="qas">
          <button class="qbtn" onclick="setInput('我想找金融行业的远程实习')">💼 金融远程</button>
          <button class="qbtn" onclick="setInput('有互联网大厂的产品经理岗位吗')">🌐 互联网产品</button>
          <button class="qbtn" onclick="setInput('预算5000左右，推荐一下')">💰 预算5000</button>
          <button class="qbtn" onclick="setInput('需要推荐信和背调支持')">📝 推荐信背调</button>
        </div>
      </div>
      <div id="typing" class="typing">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
    </div>
    <div class="chat-inp-area">
      <div class="inp-row">
        <textarea class="ctextarea" id="chat-input" placeholder="粘贴客户消息..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="sbtn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <!-- Search Page -->
  <div class="page" id="page-search">
    <div class="sp-inner">
      <div class="sbox">
        <span>🔍</span>
        <input class="sinp" id="search-input" type="search" placeholder="搜索公司、职位、行业..." oninput="doSearch()">
      </div>
      <div class="frow">
        <select class="fsel" id="filter-type" onchange="doSearch()">
          <option value="">所有类型</option>
          <option value="实地人事">实地人事</option>
          <option value="远程人事">远程人事</option>
          <option value="远程备案">远程备案</option>
          <option value="PTA">PTA</option>
        </select>
        <select class="fsel" id="filter-industry" onchange="doSearch()"><option value="">所有行业</option></select>
        <select class="fsel" id="filter-price" onchange="doSearch()">
          <option value="">所有价格</option>
          <option value="0-5000">¥0-5000</option>
          <option value="5000-8000">¥5000-8000</option>
          <option value="8000-10000">¥8000-10000</option>
          <option value="10000+">¥10000+</option>
        </select>
        <select class="fsel" id="filter-location" onchange="doSearch()">
          <option value="">所有地点</option>
          <option value="远程">远程</option>
          <option value="北京">北京</option>
          <option value="上海">上海</option>
          <option value="广州">广州</option>
          <option value="深圳">深圳</option>
          <option value="香港">香港</option>
        </select>
      </div>
      <div class="rcnt" id="results-count">共 0 个结果</div>
      <div class="rlist" id="results-list">
        <div class="empty"><div class="empty-ico">🔍</div><h3>正在加载...</h3></div>
      </div>
    </div>
  </div>

</div>

<nav class="bnav">
  <button class="nbtn active" id="nav-chat" onclick="switchPage('chat',this)">
    <span class="ni">💬</span><span>AI对话</span>
  </button>
  <button class="nbtn" id="nav-search" onclick="switchPage('search',this)">
    <span class="ni">🔍</span><span>搜索</span>
  </button>
</nav>

<!-- Detail Drawer -->
<div class="doverlay" id="doverlay" onclick="closeDrawer(event)">
  <div class="ddrawer" id="ddrawer">
    <div class="dhandle"></div>
    <div class="dhdr">
      <button class="dclose" onclick="closeDetailDrawer()">✕</button>
      <div class="d-co" id="d-co">-</div>
      <div class="dtags">
        <span class="dtag" id="d-type">-</span>
        <span class="dtag dtag2" id="d-industry">-</span>
      </div>
      <div class="d-pos" id="d-pos">-</div>
    </div>
    <div class="dbody">
      <div class="pbox">
        <div class="pitem"><div class="plbl">💰 12个月方案</div><div class="pval" id="d-p12">-</div></div>
        <div class="pitem"><div class="plbl">📅 短期方案</div><div class="pval" style="font-size:14px" id="d-p3">-</div></div>
      </div>
      <div class="igrid">
        <div class="iitem"><div class="ilbl">📋 实习形式</div><div class="ival" id="d-form">-</div></div>
        <div class="iitem"><div class="ilbl">⏱️ 实习时长</div><div class="ival" id="d-dur">-</div></div>
        <div class="iitem"><div class="ilbl">📍 工作地点</div><div class="ival" id="d-loc">-</div></div>
        <div class="iitem"><div class="ilbl">📝 申请要求</div><div class="ival" id="d-req" style="font-size:12px">-</div></div>
      </div>
      <div class="iitem" style="margin-bottom:14px"><div class="ilbl">🎁 收获福利</div><div class="ival" id="d-ben" style="font-size:12px;line-height:1.5">-</div></div>
      <div class="stitle">📄 岗位描述</div>
      <div class="jdtxt" id="d-jd">-</div>
      <div id="d-note-wrap" style="display:none">
        <div class="stitle">💡 备注</div>
        <div class="notebox" id="d-note">-</div>
      </div>
      <div class="stitle">✉️ 回复话术</div>
      <div class="rply-box" id="reply-content">正在生成话术...</div>
      <div class="rply-acts">
        <button class="rbtn copy" onclick="copyReply()">📋 复制话术</button>
        <button class="rbtn regen" onclick="regenReply()">🔄 换一个</button>
      </div>
    </div>
  </div>
</div>

小体结构展示的天然过氧化物酶活性可直接应用于细胞活力、生物样品和环境样品检测，在细胞增值、生理表征和环境监测领域有着非常良好的应用前景。通过本项目学习，了解趋磁细菌磁小体的天然纳米特性和纳米酶活性，学习趋磁细菌培养、磁小体制备和纳米酶检测分析的基本要求和流程，掌握天然磁性材料物性分析和表征的基本操作理论，培养较好的生物医学工程、磁生物学及纳米材料领域的专业实践能力。","note":""},{"type":"实地人事","industry":"科研院所","company":"中科院电工所","position":"微塑料如何成为危害环境健康的“隐形杀手”","form":"实地","duration":"1-3个月","location":"北京","benefits":"企业邮箱推荐信+实习证明+就业背调","requirements":"简历评估+面试（根据简历情况","price12m":9000,"price3m":"不变","jd":"微塑料在环境中无处不在，在海水、废水、淡水、食物、空气、瓶装水和自来水等来源中都可以检测到不同浓度的塑料微粒。微塑料作为一种新型的污染物，具有分布广、降解慢、毒理复杂等特点，已成为全球环境科学的研究热点。环境中微塑料的污染形势和环境健康十分严峻，随着每天有越来越多的塑料以前所未有的速度进入自然环境，迫切需要重新考虑在生活中、在企业中，何时以及如何使用塑料。研究表明，微塑料除了本身所含有的有毒化学物质外，由于其具有表面带电荷、高比表面积和疏水性等特性，能吸附很多有害物质，也可作为载体运输不同类型的污染物如重金属等。通过本项目学习，学员将了解周边环境中微塑料特性及其与环境健康的关系，掌握微塑料的基本理化特性；学习微塑料的鉴别、污染特性和细胞毒理分析的基本要求和流程，掌握细胞毒理/活性分析的基本操作；通过文献阅读与动手实验结合，培养科研报告写作能力，养成良好的科研习惯。","note":""},{"type":"实地人事","industry":"科研院所","company":"中科院电工所","position":"电动汽车超级快充技术研究","form":"实地","duration":"1-2个月","location":"北京","benefits":"企业邮箱推荐信+实习证明+就业背调","requirements":"简历评估+面试（根据简历情况","price12m":9000,"price3m":"不变","jd":"电动汽车作为新一代环保型交通工具，世界各国政府纷纷制定战略并出台相关政策刺激电动汽车产业的快速发展。随着电动汽车数量的快速增长，充电时长和里程焦虑问题越来越成为制约电动汽车产业发展的严重问题，而缩短充电时间被认为是使更多人能够使用电动汽车的一个关键目标。本实习项目的的研究目标在已有快充拓扑电路的基础上对电路拓扑结构作进一步的改进与优化，主要研究方向是在V2G双向功率变换器拓扑电路的基础上，设计一个电动汽车快充电路，使得其能够实现300kW以上的充电功率，同时保持DC/DC变换器系统小信号传输的稳定性，达到稳定快充的目的。","note":""},{"type":"实地人事","industry":"科研院所","company":"中科院电工所","position":"配电网电化学储能系统研究","form":"实地","duration":"1-3个月","location":"北京","benefits":"企业邮箱推荐信+实习证明+就业背调","requirements":"简历评估+面试（根据简历情况","price12m":9000,"price3m":"不变","jd":"随着全球可再生能源的普及应用、电动汽车产业的迅速发展以及智能电网的建设，储能技术成为制约抑或促进能源发展的关键环节。储能技术是一项可能对未来能源系统发展及运行带来革命性变化的技术。在众多储能技术中，技术进步最快的是电化学储能技术。以锂离子电池、超级电容器等为主导的电化学储能技术在安全性、能量转换效率和经济性等方面均取得了重大突破，极具产业化应用前景。通过实习学习了解可再生能源系统中电子电路的基本概念、理论基础和应用以及研究现状和热点，掌握目前流行的储能形式，理解并掌握多种主动均衡方法，通过结合实际工程项目对所学内容进行融会贯通。","note":""},{"type":"实地人事","industry":"科研院所","company":"中科院动物所","position":"神经科学研究助理","form":"实地","duration":"2-3个月","location":"北京","benefits":"企业邮箱推荐信+实习证明+就业背调","requirement "企业邮箱推荐信+实习证明","requirements":"简历评估+面试（根据简历情况","price12m":8000,"price3m":"不变","jd":"趋磁细菌是一类具有趋磁性行为的细菌，体内含有由膜包被的纳米磁性颗粒—磁小体(Magnetosome)。磁小体为单磁畴晶体，具永磁性，大小为几十个纳米，多数为磁铁矿（Fe3O4）性质，少数为硫铁矿（Fe3S4）性质。作为一种天然磁性纳米材料，磁小体表面含有丰富的膜蛋白包括各种活性酶等，尤其是由磁小体结构展示的天然过氧化物酶活性可直接应用于细胞活力、生物样品和环境样品检测，在细胞增值、生理表征和环境监测领域有着非常良好的应用前景。通过本项目学习，了解趋磁细菌磁小体的天然纳米特性和纳米酶活性，学习趋磁细菌培养、磁小体制备和纳米酶检测分析的基本要求和流程，掌握天然磁性材料物性分析和表征的基本操作理论，培养较好的生物医学工程、磁生物学及纳米材料领域的专业实践能力。","note":""},{"type":"远程人事","industry":"科研院所","company":"中科院电工所","position":"微塑料如何成为危害环境健康的“隐形杀手”","form":"远程","duration":"","location":"远程","benefits":"企业邮箱推荐信+实习证明","requirements":"简历评估+面试（根据简历情况","price12m":8000,"price3m":"不变","jd":"微塑料在环境中无处不在，在海水、废水、淡水、食物、空气、瓶装水和自来水等来源中都可以检测到不同浓度的塑料微粒。微塑料作为一种新型的污染物，具有分布广、降解慢、毒理复杂等特点，已成为全球环境科学的研究热点。环境中微塑料的污染形势和环境健康十分严峻，随着每天有越来越多的塑料以前所未有的速度进入自然环境，迫切需要重新考虑在生活中、在企业中，何时以及如何使用塑料。研究表明，微塑料除了本身所含有的有毒化学物质外，由于其具有表面带电荷、高比表面积和疏水性等特性，能吸附很多有害物质，也可作为载体运输不同类型的污染物如重金属等。通过本项目学习，学员将了解周边环境中微塑料特性及其与环境健康的关系，掌握微塑料的基本理化特性；学习微塑料的鉴别、污染特性和细胞毒理分析的基本要求和流程，掌握细胞毒理/活性分析的基本操作；通过文献阅读与动手实验结合，培养科研报告写作能力，养成良好的科研习惯。","note":""},{"type":"远程人事","industry":"科研院所","company":"中科院电工所","position":"电动汽车超级快充技术研究","form":"远程","duration":"","location":"远程","benefits":"企业邮箱推荐信+实习证明","requirements":"简历评估+面试（根据简历情况","price12m":8000,"price3m":"不变","jd":"电动汽车作为新一代环保型交通工具，世界各国政府纷纷制定战略并出台相关政策刺激电动汽车产业的快速发展。随着电动汽车数量的快速增长，充电时长和里程焦虑问题越来越成为制约电动汽车产业发展的严重问题，而缩短充电时间被认为是使更多人能够使用电动汽车的一个关键目标。本实习项目的的研究目标在已有快充拓扑电路的基础上对电路拓扑结构作进一步的改进与优化，主要研究方向是在V2G双向功率变换器拓扑电路的基础上，设计一个电动汽车快充电路，使得其能够实现300kW以上的充电功率，同时保持DC/DC变换器系统小信号传输的稳定性，达到稳定快充的目的。","note":""},{"type":"远程人事","industry":"科研院所","company":"中科院电工所","position":"配电网电化学储能系统研究","form":"远程","duration":"","location":"远程","benefits":"企业邮箱推荐信+实习证明","requirements":"简历评估+面试（根据简历情况","price12m":8000,"price3m":"不变","jd":"随着全球可再生能源的普及应用、电动汽车产业的迅速发展以及智能电网的建设，储能技术成为制约抑或促进能源发展的关键环节。储能技术是一项可能对未来能源系统发展及运行带来革命性变化的技术。在众多储能技术中，技术进步最快的是电化学储能技术。以锂离子电池、超级电容器等为主导的电化学储能技术在安全性、能量转换效率和经济性等方面均取得了重大突破，极具产业化应用前景。通过实习学习了解可再生能源系统中电子电路的基本概念、理论基础和应用以及研究现状和热点，掌握目前流行的储能形式，理解并掌握多种主动均衡方 function init() {
  document.getElementById("stat-total").textContent = KB_ITEMS.length;
  const inds = new Set(KB_ITEMS.map(i=>i.industry).filter(Boolean));
  document.getElementById("stat-industries").textContent = inds.size;
  const types = new Set(KB_ITEMS.map(i=>i.type).filter(Boolean));
  document.getElementById("stat-types").textContent = types.size;
  const sel = document.getElementById("filter-industry");
  [...inds].sort().forEach(ind => {
    const o = document.createElement("option"); o.value=ind; o.textContent=ind; sel.appendChild(o);
  });
  doSearch();
}

function switchPage(name, btn) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  document.querySelectorAll(".nbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

  "explanation": "对用户需求的简要解释（1-2句话）"
}

只返回JSON，不要其他内容。`;

    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        temperature: 0.3,
        max_tokens: 500
      })
    });

    const data = await response.json();
    document.getElementById('typing').style.display='none';

    if (data.error) {
      addMsg('⚠️ AI 分析失败：' + data.error.message + '\n\n已自动切换回关键词模式', 'bot');
      useAI = false;
      document.getElementById('ai-toggle').textContent = '🤖 AI';
      return;
    }

    const content = data.choices[0].message.content.trim();
    let parsed;
    try {
      // 尝试解析JSON
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        parsed = JSON.parse(jsonMatch[0]);
      } else {
        parsed = JSON.parse(content);
      }
    } catch (e) {
      // JSON解析失败，使用关键词模式
      addMsg(analyzeNeeds(text), 'bot');
      return;
    }

    // 用AI解析的参数进行搜索
    const result = searchWithAIParams(text, parsed);
    addMsg(result, 'bot');

  } catch (err) {
    document.getElementById('typing').style.display='none';
    addMsg('⚠️ 网络错误：' + err.message + '\n\n请检查网络连接，已切换回关键词模式', 'bot');
    useAI = false;
  }
}

function searchWithAIParams(originalText, params) {
  // 基于AI解析的参数搜索产品
  const needs = {
    cities: params.cities || [],
    industries: params.industries || [],
    positions: params.positions || [],
    forms: params.forms || [],
    kws: [],
    duration: params.duration || '',
    budget: params.budget || '',
    requirements: params.requirements || [],
    explanation: params.explanation || ''
  };

  // 评分搜索
  let scored = KB_ITEMS.map(item => {
    let s = 0;
    const it = ((item.company||'')+(item.position||'')+(item.industry||'')+(item.type||'')+(item.location||'')+(item.jd||'')+(item.note||'')).toLowerCase();

    // 城市匹配（最高权重）
    needs.cities.forEach(c => {
      if (item.location && item.location.includes(c)) s += 15;
      if (it.includes(c.toLowerCase())) s += 5;
    });

    // 行业匹配
    needs.industries.forEach(ind => {
      if (item.industry && item.industry.toLowerCase().includes(ind.toLowerCase())) s += 12;
      if (it.includes(ind.toLowerCase())) s += 5;
    });

    // 职位匹配
    needs.positions.forEach(p => {
      if (item.position && item.position.toLowerCase().includes(p.toLowerCase())) s += 12;
      if (it.includes(p.toLowerCase())) s += 4;
    });

    // 形式匹配
    needs.forms.forEach(f => {
      if ((item.form && item.form.includes(f)) || (item.type && item.type.includes(f))) s += 10;
    });

    // 预算匹配
    if (needs.budget) {
      const budget = parseInt(needs.budget.toString().replace(/[^0-9]/g,''));
      if (budget && item.price12m) {
        if (item.price12m <= budget * 1.2) s += 8; // 在预算内或略高
      }
    }

    // 时长匹配
    if (needs.duration) {
      const dur = needs.duration.toString();
      if (item.duration && (item.duration.includes(dur) || dur.includes(item.duration))) s += 6;
    }

    // 其他需求关键词
    needs.requirements.forEach(req => {
      if (it.includes(req.toLowerCase())) s += 5;
    });

    // 原文关键词
    originalText.toLowerCase().split(/[\s\n\uff0c,\u3002\uff01!\uff1f?]+/).filter(w=>w.length>1).forEach(w=>{
      if(it.includes(w) && w.length>2) s += 2;
    });

    return {item, s};
  });

  scored.sort((a,b)=>b.s-a.s);
  let matches = scored.filter(m=>m.s>0);
  if (!matches.length) matches = scored.slice(0,5);

  // 构建回复
  let r = '🎯 AI 智能分析结果\n\n';
  if (needs.explanation) {
    r += '📝 ' + needs.explanation + '\n\n';
  }
  r += '📍 城市：'+(needs.cities.length?needs.cities.join('、'):'未指定')+'\n';
  r += '🏢 行业：'+(needs.industries.length?needs.industries.join('、'):'未指定')+'\n';
  r += '💼 岗位：'+(needs.positions.length?needs.positions.join('、'):'未指定')+'\n';
  r += '📋 形式：'+(needs.forms.length?needs.forms.join('、'):'未指定')+'\n';
  if (needs.budget) r += '💰 预算：'+(needs.budget)+'\n';
  if (needs.duration) r += '⏱️ 时长：'+(needs.duration)+'\n';
  if (needs.requirements.length) r += '✨ 其他：'+(needs.requirements.join('、'))+'\n';
  r += '\n找到 '+Math.min(matches.length,5)+' 个最匹配岗位：\n\n';
  matches.slice(0,5).forEach((m,i)=>{
    const stars = m.s>=25?'⭐⭐⭐⭐⭐':m.s>=18?'⭐⭐⭐⭐':m.s>=10?'⭐⭐⭐':'⭐⭐';
    r += (i+1)+'. 【'+m.item.company+'】'+m.item.position+' '+stars+'\n';
    r += '   📍'+(m.item.location||'待定')+' 💰￥'+(m.item.price12m||0).toLocaleString()+' '+(m.item.type||'')+'\n\n';
  });
  r += '💡 点击底部「搜索」标签可查看完整JD并生成回复话术！';
  return r;
}

function addMsg(text, role) {
  const c = document.getElementById("chat-msgs");
  const d = document.createElement('div'); d.className='msg '+role;
  d.innerHTML='<div class="bubble">'+esc(text).replace(/\n/g,'<br>')+'</div>';
  c.insertBefore(d, document.getElementById("typing"));
  scrollChat();
}

function scrollChat() { const c=document.getElementById('chat-msgs'); setTimeout(()=>c.scrollTop=c.scrollHeight,50); }

function doSearch() {
  const kw=(document.getElementById('search-input').value||'').toLowerCase().trim();
  const ind=document.getElementById('filter-industry').value;
  const type=document.getElementById('filter-type').value;
  const loc=document.getElementById('filter-location').value;
  const prc=document.getElementById('filter-price').value;
  let res = KB_ITEMS.filter(item=>{
    if(ind&&item.industry!==ind) return false;
    if(type&&item.type!==type) return false;
    if(loc&&!(item.location&&item.location.includes(loc))) return false;
    if(prc){ const p=item.price12m||0;
      if(prc==='0-5000'&&p>5000) return false;
      if(prc==='5000-8000'&&(p<5000||p>8000)) return false;
      if(prc==='8000-10000'&&(p<8000||p>10000)) return false;
      if(prc==='10000+'&&p<10000) return false;
    }
    if(kw){ const t=((item.company||'')+' '+(item.position||'')+' '+(item.industry||'')+' '+(item.jd||'')).toLowerCase(); return t.includes(kw); }
    return true;
  });
  document.getElementById('results-count').textContent='共 '+res.length+' 个结果';
  const list=document.getElementById('results-list');
  if(!res.length){ list.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><h3>未找到匹配产品</h3><p>请尝试调整筛选条件</p></div>'; return; }
  list.innerHTML=res.map(item=>{
    const i=KB_ITEMS.indexOf(item);
    return '<div class="rc" onclick="openDetail('+i+')">'
      +'<div class="rch"><div class="rc-co">'+esc(item.company)+'</div><span class="rc-ty">'+esc(item.type||'')+'</span></div>'
      +'<div class="rc-pos">'+esc(item.position)+'</div>'
      +'<div class="rc-meta">'
      +(item.industry?'<span class="rc-tag">🏢 '+esc(item.industry)+'</span>':'')
      +(item.location?'<span class="rc-tag">📍 '+esc(item.location)+'</span>':'')
      +(item.duration?'<span class="rc-tag">⏱ '+esc(item.duration)+'</span>':'')
      +'</div>'
      +'<div class="rc-price">💰 ￥'+(item.price12m||0).toLocaleString()+'</div>'
      +'</div>';
  }).join("");
}

  document.getElementById('d-type').textContent=item.type||'-';
  document.getElementById('d-industry').textContent=item.industry||'-';
  document.getElementById('d-pos').textContent=item.position||'-';

  document.getElementById('d-p3').textContent=item.price3m||'-';
  document.getElementById('d-form').textContent=item.form||'-';
  document.getElementById('d-dur').textContent=item.duration||'-';
  document.getElementById('d-loc').textContent=item.location||'-';
  document.getElementById('d-req').textContent=item.requirements||'-';
  document.getElementById('d-ben').textContent=item.benefits||'-';

}

function closeDrawer(e){ if(e.target===document.getElementById('doverlay')) closeDetailDrawer(); }
function closeDetailDrawer(){ document.getElementById('doverlay').classList.remove('open'); document.body.style.overflow=''; }

    '为您推荐一个非常适合的岗位：\n\n🏢 '+co+'\n💼 '+pos+'\n\n【基本信息】\n• 所属行业：'+ind+'\n• 工作地点：'+loc+'\n• 实习周期：'+dur+'\n• 工作形式：'+form+'\n\n【项目收获】\n'+ben+'\n\n【费用ㄠ12个月：'+ps+' | '+p3+'\n\n【申请要求】'+req+'\n\n感兴趣的话我可以为您详细介绍申请流程～',
    '推荐岗位：'+co+' - '+pos+'\n\n✨ 岗位特色：\n- 行业：'+ind+'\n- 地点：'+loc+'\n- 时长：'+dur+'\n- 形式：'+form+'\n\n💵 价格方案：\n- 12个月：'+ps+'\n- '+p3+'\n\n🎯 您将获得：'+ben+'\n📋 申请条件：'+req+'\n\n如需查看详细JD或开始申请，请告诉我！'
  ];

function copyReply() {
  const txt=document.getElementById('reply-content').textContent;
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast('✅ 话术已复制')).catch(()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}

function fallbackCopy(txt) {
  const ta=document.createElement('textarea'); ta.value=txt; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');toast('✅ 话术已复制');}catch(e){toast('⚠ 请手动长按复制');}
  document.body.removeChild(ta);
}

function regenReply() {
  const cur=document.getElementById('reply-content').textContent;
  let t=replyTpls[Math.floor(Math.random()*replyTpls.length)],i=0;
  while(t===cur&&replyTpls.length>1&&i++<5) t=replyTpls[Math.floor(Math.random()*replyTpls.length)];
  document.getElementById('reply-content').textContent=t;
  toast('🔄 已换一套话术');
}

function analyzeNeeds(text) {
  const lt=text.toLowerCase();
  const needs={cities:[],industries:[],positions:[],forms:[],kws:[]};
  if(lt.includes('上海')||lt.includes('淪')) needs.cities.push('上海');
  if(lt.includes('北京')||lt.includes('京')) needs.cities.push('北京');
  if(lt.includes('深圳')||lt.includes('深')) needs.cities.push('深圳');
  if(lt.includes('广州')||lt.includes('广')) needs.cities.push('广州');
  if(lt.includes('杭州')) needs.cities.push('杭州');
  if(lt.includes('成都')) needs.cities.push('成都');
  if(lt.includes('科技')||lt.includes('互联网')||lt.includes('技术')){needs.industries.push('科技');needs.kws.push('技术','开发','工程师');}
  if(lt.includes('新能源')||lt.includes('能源')) needs.industries.push('能源');
  if(lt.includes('金融')||lt.includes('投行')||lt.includes('证券')) needs.industries.push('金融');
  if(lt.includes('咋询')) needs.industries.push('咋询');
  if(lt.includes('市场')||lt.includes('marketing')) needs.industries.push('市场');
  if(lt.includes('数据')) needs.industries.push('数据');
  if(lt.includes('医药')||lt.includes('医疗')) needs.industries.push('医药');
  if(lt.includes('教育')) needs.industries.push('教育');
  if(lt.includes('交互')||lt.includes('设计')||lt.includes('ui')||lt.includes('ux')) needs.positions.push('设计','交互');
  if(lt.includes('产品')) needs.positions.push('产品');
  if(lt.includes('开发')||lt.includes('程序')) needs.positions.push('开发','工程师');
  if(lt.includes('运营')) needs.positions.push('运营');
  if(lt.includes('人机交互')) needs.kws.push('人机交互');
  if(lt.includes('线下')||lt.includes('实地')||lt.includes('现场')) needs.forms.push('实地');
  if(lt.includes('远程')||lt.includes('线上')||lt.includes('pt')) needs.forms.push('远程');
  if(lt.includes('走人事')||lt.includes('人事')) needs.kws.push('人事');
  let scored=KB_ITEMS.map(item=>{
    let s=0;
    const it=((item.company||'')+(item.position||'')+(item.industry||'')+(item.type||'')+(item.location||'')+(item.jd||'')+(item.note||'')).toLowerCase();
    needs.cities.forEach(c=>{if(item.location&&item.location.includes(c))s+=10;});
    needs.industries.forEach(ind=>{if(item.industry&&item.industry.toLowerCase().includes(ind.toLowerCase()))s+=8;if(it.includes(ind.toLowerCase()))s+=3;});
    needs.positions.forEach(p=>{if(item.position&&item.position.toLowerCase().includes(p.toLowerCase()))s+=8;});
    needs.forms.forEach(f=>{if((item.form&&item.form.includes(f))||(item.type&&item.type.includes(f)))s+=6;});
    needs.kws.forEach(k=>{if(it.includes(k.toLowerCase()))s+=3;});
    lt.split(/[\s\n\uff0c,\u3002\uff01!\uff1f?]+/).filter(w=>w.length>1).forEach(w=>{if(it.includes(w)&&w.length>2)s+=1;});
    return {item,s};
  });
  scored.sort((a,b)=>b.s-a.s);
  let matches=scored.filter(m=>m.s>0);
  if(!matches.length) matches=scored.slice(0,5);
  let r='🎯 需求分析结果\n\n';
  r+='📍 城市：'+(needs.cities.length?needs.cities.join('、'):'未指定')+'\n';
  r+='🏢 行业：'+(needs.industries.length?needs.industries.join('、'):'未指定')+'\n';
  r+='💼 岗位：'+(needs.positions.length?needs.positions.join('、'):'未指定')+'\n';
  r+='📋 形式：'+(needs.forms.length?needs.forms.join('、'):'未指定')+'\n\n';
  r+='找到 '+Math.min(matches.length,5)+' 个最匹配岗位：\n\n';
  matches.slice(0,5).forEach((m,i)=>{
    const stars=m.s>=15?'⭐⭐⭐⭐⭐':m.s>=10?'⭐⭐⭐⭐':m.s>=5?'⭐⭐⭐':'⭐⭐';
    r+=(i+1)+'. 【'+m.item.company+'】'+m.item.position+' '+stars+'\n';
    r+='   📍'+(m.item.location||'待定')+' 💰￥'+(m.item.price12m||0).toLocaleString()+' '+(m.item.type||'')+'\n\n';
  });
  r+='💡 点击底部「搜索」标签可查看完整JD并生成回复话术！';
  return r;
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
